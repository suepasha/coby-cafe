<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coby's Cafe — Email Automation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #2d2d2d; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #999; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 1.5rem; margin-bottom: 1.25rem; }
  .card h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }
  .event-row { border: 1px solid #eee; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .name { font-size: 14px; font-weight: 600; }
  .meta { font-size: 12px; color: #999; margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .badge-new { background: #e8f4fd; color: #1a6fa8; }
  .badge-done { background: #e8fdf0; color: #1a8a4a; }
  .badge-processing { background: #fff8e8; color: #a06010; }
  .badge-error { background: #fde8e8; color: #a01010; }
  .badge-skipped { background: #f0f0f0; color: #888; }
  .big-btn { display: block; width: 100%; padding: 14px; background: #2d2d2d; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
  .big-btn:hover { background: #444; }
  .big-btn:disabled { background: #bbb; cursor: not-allowed; }
  #log { background: #1a1a1a; color: #00e87a; font-family: monospace; font-size: 12px; padding: 1rem; border-radius: 8px; min-height: 60px; max-height: 260px; overflow-y: auto; white-space: pre-wrap; margin-top: 1rem; display: none; }
  .success-box { background: #e8fdf0; border: 1px solid #a0d8b0; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1rem; display: none; }
  .success-box h3 { font-size: 14px; color: #1a8a4a; margin-bottom: 6px; }
  .success-box p { font-size: 13px; color: #333; line-height: 1.6; }
  .empty { font-size: 13px; color: #bbb; padding: 8px 0; }
  .progress { font-size: 13px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐾 Coby's Cafe</h1>
    <p class="subtitle">Email Template Automation</p>
  </div>

  <div class="card">
    <h2>📋 Upcoming Events</h2>
    <div id="events-list"><p class="empty">Loading events...</p></div>
  </div>

  <button class="big-btn" id="createBtn" onclick="runAutomation()" disabled>
    Create New Templates in Mailjet
  </button>

  <div id="log"></div>

  <div class="success-box" id="successBox">
    <h3>✅ Done!</h3>
    <p id="successText"></p>
  </div>
</div>

<script>
let parsedEvents = [];
let pollInterval = null;

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setBadge(i, type, label) {
  const el = document.getElementById('badge-' + i);
  if (el) { el.className = 'badge badge-' + type; el.textContent = label; }
}

function renderEvents() {
  const c = document.getElementById('events-list');
  if (!parsedEvents.length) { c.innerHTML = '<p class="empty">No events found.</p>'; return; }
  c.innerHTML = parsedEvents.map((e, i) => {
    const s = e.status.toLowerCase();
    const bc = s==='new'?'badge-new':s==='done'?'badge-done':'badge-skipped';
    const bl = s==='new'?'New':s==='done'?'Done':s||'—';
    return `<div class="event-row" id="erow-${i}">
      <div>
        <div class="name">${e.name||'Untitled'}</div>
        <div class="meta">${e.month} · ${e.date} ${e.time?'| '+e.time:''}</div>
      </div>
      <span class="badge ${bc}" id="badge-${i}">${bl}</span>
    </div>`;
  }).join('');
}

async function loadEvents() {
  try {
    const res = await fetch('/api/events');
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    parsedEvents = data.events;
    renderEvents();
    const newCount = parsedEvents.filter(e => e.status.toLowerCase() === 'new').length;
    document.getElementById('createBtn').disabled = newCount === 0;
  } catch(e) {
    document.getElementById('events-list').innerHTML = '<p style="color:red;font-size:13px;">Could not load events: ' + e.message + '</p>';
  }
}

async function pollStatus(jobId, total) {
  try {
    const res = await fetch('/api/status/' + jobId);
    const data = await res.json();
    if (!data.success) return;

    const results = data.results || [];
    log('Progress: ' + results.length + '/' + total + ' processed...');

    results.forEach(r => {
      parsedEvents.forEach((e, i) => {
        if (e.name === r.name) {
          if (r.status === 'success') setBadge(i, 'done', 'Done ✓');
          else setBadge(i, 'error', 'Error');
        }
      });
    });

    if (data.status === 'done') {
      clearInterval(pollInterval);
      const success = results.filter(r => r.status === 'success');
      const failed = results.filter(r => r.status === 'error');

      log('\n🎉 Done! ' + success.length + ' created, ' + failed.length + ' failed.');
      failed.forEach(r => log('❌ ' + r.name + ': ' + (r.error || '')));

      if (success.length) {
        document.getElementById('successBox').style.display = 'block';
        document.getElementById('successText').innerHTML =
          '<strong>' + success.length + ' template(s)</strong> created in Mailjet: <em>' +
          success.map(r=>r.name).join(', ') + '</em>.<br><br>' +
          'Go to <strong>Content → Email Templates</strong> in Mailjet to find them.';
      }

      document.getElementById('createBtn').disabled = false;
      document.getElementById('createBtn').textContent = 'Create New Templates in Mailjet';
    }
  } catch(e) {
    log('Poll error: ' + e.message);
  }
}

async function runAutomation() {
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.textContent = 'Working... (this may take a few minutes)';
  document.getElementById('log').textContent = '';
  document.getElementById('log').style.display = 'block';
  document.getElementById('successBox').style.display = 'none';

  parsedEvents.forEach((e, i) => {
    if (e.status.toLowerCase() === 'new') setBadge(i, 'processing', 'Processing...');
  });

  log('Starting automation...\n');

  try {
    const res = await fetch('/api/run', { method: 'POST' });
    const data = await res.json();

    if (!data.success) {
      log('❌ Error: ' + data.error);
      btn.disabled = false;
      btn.textContent = 'Create New Templates in Mailjet';
      return;
    }

    if (data.message) {
      log('ℹ️ ' + data.message);
      btn.disabled = false;
      btn.textContent = 'Create New Templates in Mailjet';
      return;
    }

    log('Job started! ID: ' + data.job_id + ' | Processing ' + data.total + ' event(s)...');
    log('Please wait — logging into Mailjet and importing templates...\n');

    pollInterval = setInterval(() => pollStatus(data.job_id, data.total), 5000);

  } catch(e) {
    log('❌ Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Create New Templates in Mailjet';
  }
}

loadEvents();
</script>
</body>
</html>
