<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coby's Cafe — Email Automation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #2d2d2d; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: #999; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .card-header h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .select-all { font-size: 12px; color: #1a6fa8; cursor: pointer; background: none; border: none; padding: 0; }
  .select-all:hover { text-decoration: underline; }
  .event-row { border: 1px solid #eee; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .event-row:hover { background: #fafafa; }
  .event-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: #2d2d2d; }
  .event-info { flex: 1; }
  .name { font-size: 14px; font-weight: 600; }
  .meta { font-size: 12px; color: #999; margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-new { background: #e8f4fd; color: #1a6fa8; }
  .badge-error { background: #fde8e8; color: #a01010; }
  .big-btn { display: block; width: 100%; padding: 14px; background: #2d2d2d; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
  .big-btn:hover { background: #444; }
  .big-btn:disabled { background: #bbb; cursor: not-allowed; }
  #log { background: #1a1a1a; color: #00e87a; font-family: monospace; font-size: 12px; padding: 1rem; border-radius: 8px; min-height: 60px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 1rem; display: none; }
  .downloads { margin-top: 1.5rem; display: none; }
  .downloads h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .download-item { background: #f5f5f0; border: 1px solid #e0e0d8; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .download-item .dname { font-size: 13px; font-weight: 600; }
  .dl-btn { padding: 7px 16px; background: #2d2d2d; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .dl-btn:hover { background: #444; }
  .instructions { background: #e8f4fd; border: 1px solid #b0d0f0; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1rem; }
  .instructions h3 { font-size: 14px; font-weight: 600; color: #1a6fa8; margin-bottom: 8px; }
  .instructions ol { font-size: 13px; color: #333; line-height: 2.2; padding-left: 1.2rem; }
  .empty { font-size: 13px; color: #888; text-align: center; padding: 16px; background: #f9f9f7; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐾 Coby's Cafe</h1>
    <p class="subtitle">Email Template Automation</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>📋 Upcoming Events</h2>
      <button class="select-all" onclick="toggleAll()" id="selectAllBtn">Deselect All</button>
    </div>
    <div id="events-list"><p class="empty">Loading events...</p></div>
  </div>

  <button class="big-btn" id="generateBtn" onclick="runAutomation()" disabled>
    Generate Email Templates
  </button>

  <div id="log"></div>

  <div class="downloads" id="downloads">
    <h3>📥 Download your MJML files</h3>
    <div id="download-list"></div>
    <div class="instructions">
      <h3>📤 Import into Mailjet</h3>
      <ol>
        <li>Go to <strong>Mailjet → Content → Email Templates</strong></li>
        <li>Click <strong>"Create a template"</strong></li>
        <li>Choose <strong>"By coding it in MJML"</strong></li>
        <li>Import the downloaded <strong>.mjml</strong> file</li>
      </ol>
    </div>
  </div>
</div>

<script>
let events = [];
let generatedFiles = {};

const log = msg => {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
};

const setBadge = (name, type, label) => {
  const el = document.getElementById('badge-' + name.replace(/[^a-z0-9]/gi, '_'));
  if (el) { el.className = 'badge badge-' + type; el.textContent = label; }
};

const getSelected = () => events
  .filter(e => e.status.toLowerCase() === 'new')
  .filter(e => document.getElementById('chk-' + e.name.replace(/[^a-z0-9]/gi, '_'))?.checked)
  .map(e => e.name);

const updateBtn = () => {
  document.getElementById('generateBtn').disabled = getSelected().length === 0;
};

function toggleAll() {
  const newEvents = events.filter(e => e.status.toLowerCase() === 'new');
  const allChecked = newEvents.every(e => document.getElementById('chk-' + e.name.replace(/[^a-z0-9]/gi, '_'))?.checked);
  newEvents.forEach(e => {
    const chk = document.getElementById('chk-' + e.name.replace(/[^a-z0-9]/gi, '_'));
    if (chk) chk.checked = !allChecked;
  });
  document.getElementById('selectAllBtn').textContent = allChecked ? 'Select All' : 'Deselect All';
  updateBtn();
}

function renderEvents() {
  const c = document.getElementById('events-list');

  // Only show New events
  const newEvents = events.filter(e => e.status.toLowerCase() === 'new');

  if (!newEvents.length) {
    c.innerHTML = '<p class="empty">✅ All caught up! No events with Status = "New".</p>';
    document.getElementById('selectAllBtn').style.display = 'none';
    return;
  }

  c.innerHTML = newEvents.map(e => {
    const safeId = e.name.replace(/[^a-z0-9]/gi, '_');
    return `<div class="event-row" onclick="toggleCheck('${safeId}')">
      <input type="checkbox" id="chk-${safeId}" checked onchange="updateBtn()" onclick="event.stopPropagation()">
      <div class="event-info">
        <div class="name">${e.name || 'Untitled'}</div>
        <div class="meta">${e.date}${e.time ? ' | ' + e.time : ''}</div>
      </div>
      <span class="badge badge-new" id="badge-${safeId}">New</span>
    </div>`;
  }).join('');

  updateBtn();
}

function toggleCheck(safeId) {
  const chk = document.getElementById('chk-' + safeId);
  if (chk) { chk.checked = !chk.checked; updateBtn(); }
}

async function loadEvents() {
  try {
    const res = await fetch('/api/events');
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    events = data.events;
    renderEvents();
  } catch(e) {
    document.getElementById('events-list').innerHTML = `<p style="color:red;font-size:13px;">Error: ${e.message}</p>`;
  }
}

function downloadFile(filename) {
  const blob = new Blob([generatedFiles[filename]], {type: 'text/xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function runAutomation() {
  const selected = getSelected();
  if (!selected.length) return;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  document.getElementById('log').textContent = '';
  document.getElementById('log').style.display = 'block';
  document.getElementById('downloads').style.display = 'none';
  generatedFiles = {};

  log(`Generating ${selected.length} template(s)...`);

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({selected})
    });
    const data = await res.json();

    if (!data.success) { log('❌ ' + data.error); return; }
    if (data.message) { log('ℹ️ ' + data.message); return; }

    const dlList = document.getElementById('download-list');
    dlList.innerHTML = '';
    let successCount = 0;

    data.results.forEach(r => {
      if (r.status === 'success') {
        log('✅ ' + r.name);
        generatedFiles[r.filename] = r.mjml;
        successCount++;
        // Update badges for all events in this group
        if (r.events) r.events.forEach(eName => setBadge(eName, 'done', 'Ready ✓'));
        else setBadge(r.name, 'done', 'Ready ✓');
        const div = document.createElement('div');
        div.className = 'download-item';
        const subText = r.events && r.events.length > 1 ? '<div style="font-size:11px;color:#999;margin-top:2px;">' + r.events.join(', ') + '</div>' : '';
        div.innerHTML = `<div><div class="dname">${r.name}</div>${subText}</div><button class="dl-btn" onclick="downloadFile('${r.filename}')">⬇ Download</button>`;
        dlList.appendChild(div);
      } else {
        log('❌ ' + r.name + ': ' + r.error);
        if (r.events) r.events.forEach(eName => setBadge(eName, 'error', 'Error'));
      }
    });

    log(`\n✅ ${successCount} template(s) ready!`);
    if (successCount > 0) document.getElementById('downloads').style.display = 'block';

  } catch(e) {
    log('❌ ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Email Templates';
  }
}

loadEvents();
</script>
</body>
</html>
